format:
  html:
    theme: [flatly, styles.scss]
    toc: true
    code-copy: true
    code-overflow: wrap
    anchor-sections: true
    link-external-newwindow: true
    fig-align: center
    syntax-highlighting:
      light: github-light
      dark: github-dark

mermaid:
  theme: neutral

execute:
  freeze: true


